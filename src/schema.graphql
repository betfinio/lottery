query LotteryRounds($address: Bytes) {
	rounds(where: { address: $address, status_not: "cancelled" }, orderBy: round, orderDirection: desc, first: 1000) {
		round
		address
		status
		started
		betsCount
		betsAmount
		winNumbers
		winSymbol
	}
}

query LotteryRoundBets($address: Bytes, $round: BigInt) {
	bets(where: { address: $address, round_: { round: $round } }, first: 1000, orderBy: blockTimestamp, orderDirection: asc) {
		player
		recipient
		amount
		betAddress
		status
		prize
		blockTimestamp
		tickets {
			numbers
			symbol
		}
	}
}

query LotteryPlayerBetsByRound($address: Bytes, $round: BigInt, $player: Bytes) {
	bets(where: { address: $address, round_: { round: $round }, player: $player }, orderBy: blockTimestamp, orderDirection: desc) {
		player
		recipient
		amount
		betAddress
		status
		prize
		blockTimestamp
		tickets {
			numbers
			symbol
		}
		round {
			round
			status
			winNumbers
			winSymbol
		}
	}
}

query LotteryPlayerBets($address: Bytes, $player: Bytes) {
	bets(where: { address: $address, player: $player }, orderBy: blockTimestamp, orderDirection: desc, first: 1000) {
		player
		amount
		betAddress
		status
		prize
		blockTimestamp
		tickets {
			numbers
			symbol
		}
		round {
			round
			status
			started
			betsAmount
			winNumbers
			winSymbol
		}
	}
}

query LotteryRoundsByPlayer($address: Bytes, $player: Bytes) {
	rounds(where: { address: $address, bets_: { player: $player } }, orderBy: round, orderDirection: desc) {
		round
		address
		status
		started
		betsCount
		betsAmount
		winNumbers
		winSymbol
	}
}

query LotteryRoundDetails($address: Bytes, $round: BigInt) {
	rounds(where: { address: $address, round: $round }) {
		round
		address
		status
		started
		betsCount
		betsAmount
		winNumbers
		winSymbol
	}
}

query LotteryUnclaimedBets($address: Bytes) {
	bets(where: { address: $address, status: "pending", round_: { status: "settled" } }, first: 500, orderBy: blockTimestamp, orderDirection: desc) {
		betAddress
		player
	}
}
