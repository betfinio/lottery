query GetActiveRounds($now: BigInt) {
	rounds(first: 100, where: { timestamp_gt: $now }, orderBy: timestamp, orderDirection: asc) {
		id
		round
		timestamp
		blockNumber
	}
}

fragment Ticket on Ticket {
	id
	owner
	tokenId
	round {
		id
		round
		timestamp
		blockNumber
	}
	betAddress
	lines {
		id
		numbers
		symbol
	}
	linesCount
	created
	updated
	amount
	symbolUnlocked
}

query GetTickets($player: Bytes, $now: BigInt) {
	active: tickets(where: { owner: $player, round_: { timestamp_gte: $now } }, orderBy: round__timestamp, orderDirection: asc) {
		...Ticket
	}
	old: tickets(where: { owner: $player, round_: { timestamp_lt: $now } }, orderBy: round__timestamp, orderDirection: desc) {
		...Ticket
	}
}
