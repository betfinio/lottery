query GetActiveRounds($now: BigInt) {
	rounds(first: 100, where: { timestamp_gt: $now }, orderBy: timestamp, orderDirection: asc) {
		...Round
	}
}

query GetOldRounds($now: BigInt) {
	rounds(first: 1000, where: { timestamp_lte: $now }, orderBy: timestamp, orderDirection: desc) {
		...Round
	}
}

fragment Round on Round {
	id
	round
	timestamp
	blockNumber
	ticketPrice
	ticketsCount
	linesCount
	bank
}

fragment Ticket on Ticket {
	id
	owner
	tokenId
	round {
		id
		round
		timestamp
		blockNumber
	}
	betAddress
	lines {
		id
		numbers
		symbol
	}
	linesCount
	created
	updated
	amount
	symbolUnlocked
}

query GetPlayerRounds($player: Bytes, $now: BigInt) {
	rounds(where: { tickets_: { owner: $player } }, orderBy: timestamp, orderDirection: desc) {
		...Round
	}
}

query GetTickets($player: Bytes, $now: BigInt) {
	active: tickets(where: { owner: $player, round_: { timestamp_gte: $now } }, orderBy: round__timestamp, orderDirection: asc) {
		...Ticket
	}
	old: tickets(where: { owner: $player, round_: { timestamp_lt: $now } }, orderBy: round__timestamp, orderDirection: desc) {
		...Ticket
	}
}

query GetPlayerTicketByRound($round: Bytes, $player: Bytes) {
	tickets(where: { round_: { round: $round }, owner: $player }, orderBy: created, orderDirection: desc) {
		...Ticket
	}
}

query GetRoundDetails($round: Bytes!) {
	rounds(where: { round: $round }) {
		...Round
	}
}
