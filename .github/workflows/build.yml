name: Build and Deploy

on:
  push:
    branches:
      - prod/*
      - dev
      - inlang

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  setup:
    name: Setup and Build
    if: github.ref_name != 'inlang'
    environment: ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Fetch variables
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            ,${{ secrets.AWS_ENVIRONMENT }}
            ,${{ github.ref_name }}
          parse-json-secrets: true
      
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          registry-url: "https://npm.pkg.github.com"
          scope: '@betfinio'
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
        env:
          BUN_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build
        env:
          PUBLIC_OUTPUT_URL: https://${{secrets.AWS_BUCKET}}
          PUBLIC_BRANCH: ${{ github.ref_name }}
          PUBLIC_DEPLOYED: ${{ github.sha }}
        run: bun run build --env-mode ${{ secrets.AWS_ENVIRONMENT }}
      
      - name: Deploy to S3
        run: aws s3 cp ./dist s3://${{secrets.AWS_BUCKET}} --cache-control 'public, max-age=0' --recursive
      
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{secrets.AWS_DISTRIBUTION_ID}} --paths '/*'

  inlang-pr:
    name: Create Inlang PR
    if: github.ref_name == 'inlang'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create PR to dev
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          gh pr create -B dev -H inlang \
            --title 'Update locales' \
            --body 'Created by Github Action'

  release-pr:
    name: Create Release PRs
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create PRs to prod branches
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          for branch in io games gg; do
            gh pr create -B prod/$branch -H dev \
              --title "Release to prod/$branch" \
              --body 'Created by Github Action'
          done
