name: Cleanup Release Branch Resources

on:
  delete

permissions:
  id-token: write
  contents: read

env:
  REGION: ${{ secrets.AWS_REGION }}
  BRANCH_NAME: ${{ github.event.ref }}

jobs:
  cleanup:
    name: Cleanup AWS Resources
    if: startsWith(github.event.ref, 'release/')
    environment: prod/io
    runs-on: ubuntu-latest
    steps:
      - name: Extract branch name
        run: echo "BRANCH_NAME=${BRANCH_NAME#release/}" >> $GITHUB_ENV
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Delete CloudFront Distribution
        run: |
          DISTRIBUTION_NAME="${BRANCH_NAME}.${{ secrets.AWS_BUCKET }}"
          DISTRIBUTION_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='$DISTRIBUTION_NAME'].Id" --output text)
          
          if [ ! -z "$DISTRIBUTION_ID" ]; then
            # Get the current distribution config and ETag
            CONFIG_OUTPUT=$(aws cloudfront get-distribution-config --id $DISTRIBUTION_ID)
            ETAG=$(echo "$CONFIG_OUTPUT" | jq -r '.ETag')
            
            # Extract just the DistributionConfig, disable it, and save to file
            echo "$CONFIG_OUTPUT" | jq '.DistributionConfig | .Enabled = false' > updated-config.json
            
            # Update the distribution
            aws cloudfront update-distribution --id $DISTRIBUTION_ID --if-match "$ETAG" --distribution-config file://updated-config.json
            
            # Wait for the distribution to be deployed
            echo "Waiting for distribution to be disabled..."
            aws cloudfront wait distribution-deployed --id $DISTRIBUTION_ID
            
            # Get the new ETag for deletion
            FINAL_CONFIG=$(aws cloudfront get-distribution --id $DISTRIBUTION_ID)
            FINAL_ETAG=$(echo "$FINAL_CONFIG" | jq -r '.ETag')
            
            # Delete the distribution
            aws cloudfront delete-distribution --id $DISTRIBUTION_ID --if-match "$FINAL_ETAG"
          fi

      - name: Delete S3 Bucket
        run: |
          BUCKET="${BRANCH_NAME}.${{ secrets.AWS_BUCKET }}"
          if aws s3api head-bucket --bucket $BUCKET 2>/dev/null; then
            # Empty the bucket first
            aws s3 rm s3://$BUCKET --recursive
            # Delete the bucket
            aws s3api delete-bucket --bucket $BUCKET --region ${{ env.REGION }}
          fi