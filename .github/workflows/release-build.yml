name: Build and Deploy Release Branch

on:
  push:
    branches:
      - release/*

permissions:
  contents: write
  pull-requests: write
  packages: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  REGION: ${{ secrets.AWS_REGION }}
  BRANCH_NAME: ${{ github.ref_name }}

jobs:
  build-and-deploy:
    name: Build and Deploy
    environment: prod/io
    runs-on: ubuntu-latest
    steps:
      - name: Extract branch name
        run: echo "BRANCH_NAME=${GITHUB_REF_NAME#release/}" >> $GITHUB_ENV
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Fetch variables
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            ,production
            ,prod/io
          parse-json-secrets: true
      
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup S3 bucket
        id: setup-s3
        env:
          BUCKET: ${{ env.BRANCH_NAME }}.${{ secrets.AWS_BUCKET }}
        run: |
          # Check if bucket exists
          if aws s3api head-bucket --bucket $BUCKET 2>/dev/null; then
            echo "bucket_exists=true" >> $GITHUB_OUTPUT
          else
            echo "bucket_exists=false" >> $GITHUB_OUTPUT
            # Create bucket if it doesn't exist
            aws s3api create-bucket \
              --bucket $BUCKET \
              --region ${{ env.REGION }} \
              --object-ownership BucketOwnerPreferred \
              --create-bucket-configuration LocationConstraint=${{ env.REGION }}
          fi
          
          # Configure bucket settings
          aws s3api put-public-access-block \
            --bucket $BUCKET \
            --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"
          aws s3api put-bucket-acl --bucket $BUCKET --acl public-read
          
          # Set bucket policy
          envsubst < .github/s3-bucket-policy.json > policy.json
          aws s3api put-bucket-policy --bucket $BUCKET --policy file://policy.json
          
          # Configure website hosting
          aws s3 website s3://$BUCKET/ --index-document index.html --error-document index.html
      
      - name: Setup CloudFront distribution
        id: setup-cloudfront
        env:
          BUCKET: ${{ env.BRANCH_NAME }}.${{ secrets.AWS_BUCKET }}
          DISTRIBUTION_NAME: ${{ env.BRANCH_NAME }}.${{ secrets.AWS_BUCKET }}
        run: |
          # Check if distribution exists
          DISTRIBUTION_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='$DISTRIBUTION_NAME'].Id" --output text)
          
          if [ -z "$DISTRIBUTION_ID" ]; then
            # Create distribution if it doesn't exist
            envsubst < .github/cloudfront-distribution.json > distribution-config.json
            aws cloudfront create-distribution --distribution-config file://distribution-config.json
            
            # Get the new distribution ID
            DISTRIBUTION_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='$DISTRIBUTION_NAME'].Id" --output text)
          fi
          
          # Get distribution domain
          DOMAIN=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='$DISTRIBUTION_NAME'].DomainName" --output text)
          echo "distribution_domain=$DOMAIN" >> $GITHUB_OUTPUT
          echo "distribution_id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          registry-url: "https://npm.pkg.github.com"
          scope: '@betfinio'
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
        env:
          BUN_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build application
        env:
          PUBLIC_OUTPUT_URL: https://${{ steps.setup-cloudfront.outputs.distribution_domain }}
          PUBLIC_BRANCH: ${{ github.ref_name }}
          PUBLIC_DEPLOYED: ${{ github.sha }}
        run: bun run build --env-mode production
      
      - name: Deploy to S3 and invalidate CloudFront
        env:
          BUCKET: ${{ env.BRANCH_NAME }}.${{ secrets.AWS_BUCKET }}
          DISTRIBUTION_ID: ${{ steps.setup-cloudfront.outputs.distribution_id }}
        run: |
          # Deploy files to S3
          aws s3 cp ./dist s3://$BUCKET --cache-control 'public, max-age=0' --recursive
          
          # Invalidate CloudFront cache
          aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
      
      - name: Display summary
        env:
          BUCKET: ${{ env.BRANCH_NAME }}.${{ secrets.AWS_BUCKET }}
          DISTRIBUTION_DOMAIN: ${{ steps.setup-cloudfront.outputs.distribution_domain }}
          DISTRIBUTION_ID: ${{ steps.setup-cloudfront.outputs.distribution_id }}
        run: |
          echo "## Deployment URL" >> $GITHUB_STEP_SUMMARY
          echo "Your release branch has been deployed to: [https://$DISTRIBUTION_DOMAIN](https://$DISTRIBUTION_DOMAIN)" >> $GITHUB_STEP_SUMMARY